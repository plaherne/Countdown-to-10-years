<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to 10 Years</title>
    <!-- Google Fonts for the "Love Inspired" look -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --text-shadow: 2px 2px 6px rgba(0,0,0,0.8), 0px 0px 15px rgba(0,0,0,0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* Fallback sky blue */
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Uses the wedding photo currently on your GitHub */
            background-image: linear-gradient(to right, rgba(0,0,0,0.4), rgba(0,0,0,0.1)), url('RP1023.JPG?v=mobile-layout');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .fancy-font {
            font-family: 'Dancing Script', cursive;
            text-shadow: var(--text-shadow);
        }

        .number-font {
            font-family: 'Montserrat', sans-serif;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            text-shadow: var(--text-shadow);
        }

        @media (max-width: 768px) {
            .background-container {
                background-position: 65% center; /* Adjusts photo centering for mobile */
            }
        }
    </style>
</head>
<!-- Added pt-16 to push content to the top on mobile, and items-start instead of items-center -->
<body class="flex items-start md:items-center justify-center md:justify-start min-h-screen pt-16 md:pt-0">

    <div class="background-container"></div>

    <!-- Main Content Area - Reduced horizontal padding on mobile to make room for bigger numbers -->
    <div class="relative z-10 w-full max-w-2xl px-4 md:px-16 lg:px-24 text-white">
        
        <!-- Adjusted margin bottom to bring title closer to numbers on mobile -->
        <h1 class="fancy-font text-5xl md:text-7xl mb-6 md:mb-8 drop-shadow-lg text-center md:text-left">
            Countdown to 10 years
        </h1>

        <!-- Countdown Flex Container - wraps beautifully on iPhone -->
        <div id="countdown" class="flex flex-wrap justify-center md:justify-start gap-3 md:gap-4 text-center">
            
            <div class="countdown-item w-[28%] md:w-auto min-w-[75px] md:min-w-[90px] p-2 md:p-3 flex flex-col items-center justify-center">
                <!-- Numbers are now text-4xl on mobile, text-5xl on PC -->
                <span id="months" class="number-font text-4xl md:text-5xl font-bold">00</span>
                <span class="text-[0.65rem] md:text-xs uppercase tracking-widest mt-1 opacity-80">Months</span>
            </div>

            <div class="countdown-item w-[28%] md:w-auto min-w-[75px] md:min-w-[90px] p-2 md:p-3 flex flex-col items-center justify-center">
                <span id="days" class="number-font text-4xl md:text-5xl font-bold">00</span>
                <span class="text-[0.65rem] md:text-xs uppercase tracking-widest mt-1 opacity-80">Days</span>
            </div>

            <div class="countdown-item w-[28%] md:w-auto min-w-[75px] md:min-w-[90px] p-2 md:p-3 flex flex-col items-center justify-center">
                <span id="hours" class="number-font text-4xl md:text-5xl font-bold">00</span>
                <span class="text-[0.65rem] md:text-xs uppercase tracking-widest mt-1 opacity-80">Hrs</span>
            </div>

            <div class="countdown-item w-[28%] md:w-auto min-w-[75px] md:min-w-[90px] p-2 md:p-3 flex flex-col items-center justify-center">
                <span id="minutes" class="number-font text-4xl md:text-5xl font-bold">00</span>
                <span class="text-[0.65rem] md:text-xs uppercase tracking-widest mt-1 opacity-80">Mins</span>
            </div>

            <div class="countdown-item w-[28%] md:w-auto min-w-[75px] md:min-w-[90px] p-2 md:p-3 flex flex-col items-center justify-center">
                <span id="seconds" class="number-font text-4xl md:text-5xl font-bold text-pink-200">00</span>
                <span class="text-[0.65rem] md:text-xs uppercase tracking-widest mt-1 opacity-80">Secs</span>
            </div>

        </div>

        <p class="mt-10 md:mt-12 italic opacity-90 text-lg md:text-xl fancy-font text-center md:text-left">
            August 19th, 2026 - Paul & Roberta
        </p>
    </div>

    <script>
        // Countdown Logic
        const targetDate = new Date("August 19, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<div class='text-4xl fancy-font w-full text-center'>Happy 10th Anniversary!</div>";
                return;
            }

            const totalDays = Math.floor(distance / (1000 * 60 * 60 * 24));
            const months = Math.floor(totalDays / 30.44);
            const days = Math.floor(totalDays % 30.44);
            
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("months").innerText = months.toString().padStart(2, '0');
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
